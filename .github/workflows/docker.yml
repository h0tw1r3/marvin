name: Docker
run-name: >
  Build
  ${{ inputs.tag && format('tag={0}', inputs.tag) || '' }}
  ${{ inputs.latest && format('latest={0}', inputs.latest) || '' }}
  ${{ inputs.python && format('python={0}', inputs.python) || '' }}
  ${{ inputs.push && format('push={0}', inputs.push) || ''}}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: tag image
        type: string
      latest:
        description: tag image as latest
        type: boolean
        default: false
      push:
        description: push to registry
        type: boolean
        default: true
      python:
        description: version
        type: choice
        default: '3.12'
        options:
          - '3.12'
          - '3.13'
          - '3.14'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  manual:
    uses: ./.github/workflows/template_docker.yml
    secrets: inherit
    with:
      tag: ${{ inputs.tag }}
      push: ${{ inputs.push == true }}
      python: ${{ inputs.python }}
