name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/ruff

      - uses: ./.github/actions/pytest
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
