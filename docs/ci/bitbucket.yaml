# ============================================
# Bitbucket Pipelines configuration for marvin
# ============================================

image: ghcr.io/h0tw1r3/marvin:latest

options:
  size: 2x
  max-time: 30

# --------------------------------------------
# Common base configuration (anchor)
# --------------------------------------------
definitions:
  steps:
    - step: &marvin-base
        name: "marvin (Base)"
        trigger: manual
        script:
          - echo "🚀 Starting marvin for Bitbucket PR..."
          - marvin run
        variables:
          # ===============================
          # LLM provider & model
          # ===============================
          LLM__PROVIDER: "OPENAI"
          LLM__META__MODEL: "gpt-4o-mini"
          LLM__META__MAX_TOKENS: "15000"
          LLM__META__TEMPERATURE: "0.3"
          LLM__HTTP_CLIENT__API_URL: "https://api.openai.com/v1"
          LLM__HTTP_CLIENT__API_TOKEN: "${OPENAI_API_KEY}"

          # ===============================
          # VCS (Bitbucket Cloud integration)
          # ===============================
          VCS__PROVIDER: "BITBUCKET_CLOUD"

          # Context: PR metadata available in Bitbucket Pipelines.
          # Docs: https://support.atlassian.com/bitbucket-cloud/docs/variables-and-secrets/
          VCS__PIPELINE__WORKSPACE: "${BITBUCKET_WORKSPACE}"
          VCS__PIPELINE__REPO_SLUG: "${BITBUCKET_REPO_SLUG}"
          VCS__PIPELINE__PULL_REQUEST_ID: "${BITBUCKET_PR_ID}"

          # Bitbucket API access (use App Password or OAuth token)
          VCS__HTTP_CLIENT__API_URL: "https://api.bitbucket.org/2.0"
          VCS__HTTP_CLIENT__API_TOKEN: "${BITBUCKET_APP_PASSWORD}"

          # SSL / Timeout
          VCS__HTTP_CLIENT__VERIFY: "true"
          VCS__HTTP_CLIENT__TIMEOUT: "120"

          # ===============================
          # Core settings
          # ===============================
          CORE__CONCURRENCY: "7"

          # ===============================
          # Review configuration
          # ===============================
          REVIEW__MODE: "FULL_FILE_DIFF"
          REVIEW__DRY_RUN: "false"

          REVIEW__INLINE_TAG: "#marvin-inline"
          REVIEW__SUMMARY_TAG: "#marvin-summary"
          REVIEW__INLINE_REPLY_TAG: "#marvin-inline-reply"
          REVIEW__SUMMARY_REPLY_TAG: "#marvin-summary-reply"
          REVIEW__INLINE_COMMENT_FALLBACK: "true"

          # ===============================
          # Logging & artifacts
          # ===============================
          LOGGER__LEVEL: "INFO"
          LOGGER__FORMAT: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {extra[logger_name]} | {message}"
          ARTIFACTS__LLM_DIR: "./artifacts/llm"
          ARTIFACTS__VCS_DIR: "./artifacts/vcs"
          # yaml is readable but lossy; use json for exact/lossless preservation.
          ARTIFACTS__FORMAT: "yaml"
          ARTIFACTS__LLM_ENABLED: "false"
          ARTIFACTS__VCS_ENABLED: "false"

          # ===============================
          # Optional behavior
          # ===============================
          # Limit number of AI comments per run:
          # REVIEW__MAX_INLINE_COMMENTS: "30"
          # REVIEW__MAX_CONTEXT_COMMENTS: "50"

          # Example filters (optional):
          # REVIEW__ALLOW_CHANGES: '["src/*", "lib/*"]'
          # REVIEW__IGNORE_CHANGES: '["docs/*", "README.md"]'

# --------------------------------------------
# Pipelines
# --------------------------------------------
pipelines:
  pull-requests:
    '**':
      - step:
          name: "Init pipeline"
          script:
            - echo "Initializing Bitbucket marvin..."

  custom:
    # Run full review
    marvin-all:
      - step:
          <<: *marvin-base
          name: "marvin (All)"
          script:
            - marvin run

    # Inline review only
    marvin-inline:
      - step:
          <<: *marvin-base
          name: "marvin (Inline)"
          script:
            - marvin run-inline

    # Context review only
    marvin-context:
      - step:
          <<: *marvin-base
          name: "marvin (Context)"
          script:
            - marvin run-context

    # Summary review
    marvin-summary:
      - step:
          <<: *marvin-base
          name: "marvin (Summary)"
          script:
            - marvin run-summary

    # Inline reply mode
    marvin-inline-reply:
      - step:
          <<: *marvin-base
          name: "marvin (Inline Reply)"
          script:
            - marvin run-inline-reply

    # Summary reply mode
    marvin-summary-reply:
      - step:
          <<: *marvin-base
          name: "marvin (Summary Reply)"
          script:
            - marvin run-summary-reply

    marvin-clear-inline:
      - step:
          <<: *marvin-base
          name: "marvin (Clear Inline Comments)"
          script:
            - marvin clear-inline

    marvin-clear-summary:
      - step:
          <<: *marvin-base
          name: "marvin (Clear Summary Comments)"
          script:
            - marvin clear-summary
